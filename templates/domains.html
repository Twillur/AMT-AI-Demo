<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Domains — AMT</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Space Grotesk', system-ui, sans-serif; }
        body {
            background: #09090e;
            background-image: radial-gradient(circle, #1a1a26 1px, transparent 1px);
            background-size: 28px 28px;
            color: #e8e8f0;
            min-height: 100vh;
        }
        .glass { background: rgba(14,14,20,.88); backdrop-filter: blur(14px); }

        .domain-card {
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,.07);
            background: rgba(14,14,22,.8);
            overflow: hidden;
            transition: box-shadow .25s, border-color .25s, transform .2s;
        }
        .domain-card:hover { transform: translateY(-2px); }

        .tool-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 10px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,.08);
            background: rgba(255,255,255,.03);
            font-size: .72rem; cursor: pointer;
            transition: border-color .15s, background .15s;
        }
        .tool-pill:hover { background: rgba(255,255,255,.07); border-color: rgba(255,255,255,.15); }
        .tool-pill.active { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.2); }

        .tool-detail {
            display: none;
            animation: slideIn .2s cubic-bezier(.16,1,.3,1) both;
        }
        .tool-detail.open { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .table-row {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,.04);
            cursor: default;
        }
        .table-row.clickable { cursor: pointer; transition: background .15s; }
        .table-row.clickable:hover { background: rgba(255,255,255,.03); }
        .table-row:last-child { border-bottom: none; }

        .type-badge {
            font-size: .6rem; font-weight: 700; letter-spacing: .07em;
            padding: 2px 7px; border-radius: 6px; flex-shrink: 0; margin-top: 1px;
        }

        /* ── Schema expand panel ── */
        .schema-panel {
            display: none;
            padding: 0 14px 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,.04);
            animation: slideIn .18s cubic-bezier(.16,1,.3,1) both;
        }
        .schema-panel.open { display: block; }
        .schema-inner {
            background: rgba(0,0,0,.3);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 10px;
            overflow: hidden;
        }
        .schema-col-row {
            display: flex; align-items: center; gap: 8px;
            padding: 5px 10px;
            border-bottom: 1px solid rgba(255,255,255,.04);
            font-size: .71rem;
        }
        .schema-col-row:last-child { border-bottom: none; }
        .schema-col-name {
            font-family: monospace; color: #c8d8ff; min-width: 160px;
        }
        .schema-col-name.pk { color: #f0a500; }
        .col-type-badge {
            font-size: .58rem; font-weight: 700; letter-spacing: .06em;
            padding: 1px 6px; border-radius: 5px; flex-shrink: 0;
        }
        .pk-badge {
            font-size: .58rem; font-weight: 700; letter-spacing: .06em;
            padding: 1px 6px; border-radius: 5px;
            background: rgba(240,165,0,.12); color: #c09040;
            border: 1px solid rgba(240,165,0,.2); flex-shrink: 0;
        }
        .chevron { transition: transform .2s; color: #333355; font-size: .7rem; margin-left: auto; }
        .chevron.open { transform: rotate(90deg); }

        .stat-chip {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 16px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,.07);
            background: rgba(255,255,255,.02);
        }
        .slabel {
            font-size: .62rem; font-weight: 700; letter-spacing: .1em;
            text-transform: uppercase; color: #2e2e48;
        }
        .param-tag {
            font-size: .65rem; padding: 1px 7px; border-radius: 5px;
            background: rgba(255,255,255,.05); color: #66668a;
            border: 1px solid rgba(255,255,255,.07);
        }
        .param-tag.required { background: rgba(240,165,0,.08); color: #c09040; border-color: rgba(240,165,0,.2); }
        .embedded-badge {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: .65rem; font-weight: 700; letter-spacing: .05em;
            padding: 3px 9px; border-radius: 20px;
        }

        /* ── DB Schema section (bottom panel) ── */
        #schema-section {
            margin: 0 24px 32px;
        }
        .schema-section-title {
            font-size: .7rem; font-weight: 700; letter-spacing: .12em;
            text-transform: uppercase; color: #333360;
            padding: 20px 0 10px;
            border-top: 1px solid rgba(255,255,255,.05);
        }
        .schema-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 8px;
        }
        .schema-table-card {
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 10px;
            background: rgba(14,14,22,.7);
            overflow: hidden;
        }
        .schema-table-header {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px;
            cursor: pointer;
            background: rgba(255,255,255,.02);
            border-bottom: 1px solid rgba(255,255,255,.05);
            transition: background .15s;
        }
        .schema-table-header:hover { background: rgba(255,255,255,.05); }
        .schema-table-name {
            font-family: monospace; font-size: .8rem; font-weight: 600;
            color: #b0b8e0; flex: 1;
        }
        .schema-col-count {
            font-size: .65rem; color: #333360;
        }
        .schema-cols-body {
            display: none;
            padding: 4px 0;
        }
        .schema-cols-body.open { display: block; }
        .schema-field {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 12px;
            font-size: .7rem;
        }
        .schema-field:hover { background: rgba(255,255,255,.02); }
        .field-name {
            font-family: monospace; color: #8898cc; flex: 1;
        }
        .field-name.pk { color: #f0a500; }
    </style>
</head>
<body>

<!-- Header -->
<header class="glass border-b border-white/[.05] px-6 py-3.5 flex items-center justify-between sticky top-0 z-20">
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl flex items-center justify-center font-bold text-sm text-black flex-shrink-0"
             style="background: linear-gradient(135deg,#f0a500,#e05500); box-shadow: 0 0 16px -4px rgba(240,165,0,.4)">A</div>
        <div>
            <p class="text-sm font-semibold text-white leading-tight">AI Domains</p>
            <p class="text-xs leading-tight" style="color:#44445a">Routing verticals — the AI uses these to classify requests and pick the right tools & tables</p>
        </div>
    </div>
    <div class="flex items-center gap-3">
        <div id="hdr-stats" class="flex gap-2"></div>
        <a href="/embeddings"
           class="text-xs px-3 py-1.5 rounded-lg border border-white/[.07] hover:border-white/[.18] transition-colors"
           style="color:#44445a; text-decoration:none">✦ Vector Space</a>
        <a href="/"
           class="text-xs px-3 py-1.5 rounded-lg border border-white/[.07] hover:border-white/[.18] transition-colors"
           style="color:#44445a; text-decoration:none">← Back to AI</a>
    </div>
</header>

<!-- Summary stats bar -->
<div id="stats-bar" class="flex gap-4 px-6 py-4 border-b border-white/[.04]" style="background:rgba(8,8,13,.7)"></div>

<!-- Domain cards grid -->
<main class="px-6 py-6">
    <div id="domains-grid" class="grid gap-5" style="grid-template-columns: repeat(auto-fill, minmax(540px, 1fr))"></div>
</main>

<!-- DB Schema section -->
<div id="schema-section">
    <p class="schema-section-title">Database Schema — SQLite (SAP SD/MM/FI/CS aligned)</p>
    <div id="schema-grid" class="schema-grid"></div>
</div>

<script>
const TYPE_COLOR = {
    INTEGER: { bg:'rgba(59,126,255,.12)', fg:'#6090ff',  border:'rgba(59,126,255,.2)'  },
    TEXT:    { bg:'rgba(16,217,122,.1)',  fg:'#10d97a',  border:'rgba(16,217,122,.2)'  },
    REAL:    { bg:'rgba(240,165,0,.1)',   fg:'#d4a020',  border:'rgba(240,165,0,.2)'   },
    NUMERIC: { bg:'rgba(240,165,0,.1)',   fg:'#d4a020',  border:'rgba(240,165,0,.2)'   },
    BLOB:    { bg:'rgba(168,85,247,.1)',  fg:'#a855f7',  border:'rgba(168,85,247,.2)'  },
};
function typeColor(t) {
    const k = (t||'TEXT').split('(')[0].toUpperCase();
    return TYPE_COLOR[k] || TYPE_COLOR.TEXT;
}

async function load() {
    const [domainsRes, schemaRes] = await Promise.all([
        fetch('/api/domains'),
        fetch('/api/schema'),
    ]);
    const domains = await domainsRes.json();
    const schema  = await schemaRes.json();
    renderStats(domains, schema);
    renderGrid(domains, schema);
    renderSchemaSection(schema);
}

function renderStats(domains, schema) {
    const totalTools  = domains.reduce((s,d) => s + d.tools.length, 0);
    const totalTables = domains.reduce((s,d) => s + d.tables.length, 0);
    const dbTables    = Object.keys(schema).length;

    document.getElementById('hdr-stats').innerHTML = [
        { label: 'Active Domains', value: domains.length, color: '#10d97a' },
        { label: 'Tools',          value: totalTools,     color: '#3b7eff' },
        { label: 'Tables / Stores', value: totalTables,   color: '#9d5eff' },
    ].map(s => `
        <div class="flex items-center gap-2 px-3 py-1 rounded-xl border border-white/[.06]" style="background:rgba(255,255,255,.02)">
            <span class="text-sm font-bold" style="color:${s.color}">${s.value}</span>
            <span class="text-xs" style="color:#33334a">${s.label}</span>
        </div>`).join('');

    document.getElementById('stats-bar').innerHTML = [
        { icon:'🔵', label:'Active Domains',    value: domains.length,  color:'#3b7eff' },
        { icon:'🔧', label:'Mapped Tools',       value: totalTools,      color:'#10d97a' },
        { icon:'🗄️', label:'Tables / Stores',   value: totalTables,     color:'#9d5eff' },
        { icon:'📊', label:'DB Tables',          value: dbTables,        color:'#f0a500' },
        { icon:'⚡', label:'n8n Automations',    value: '5 workflows',   color:'#f0a500' },
    ].map(s => `
        <div class="stat-chip">
            <span>${s.icon}</span>
            <div>
                <p class="text-sm font-bold leading-tight" style="color:${s.color}">${s.value}</p>
                <p class="leading-tight" style="font-size:.62rem; color:#2e2e48">${s.label}</p>
            </div>
        </div>`).join('');
}

function renderGrid(domains, schema) {
    document.getElementById('domains-grid').innerHTML = domains.map(d => domainCard(d, schema)).join('');
}

function domainCard(d, schema) {
    const toolsHtml = d.tools.map((t, i) => `
        <button onclick="toggleTool('${d.id}', ${i})"
                id="pill-${d.id}-${i}"
                class="tool-pill">
            <span style="width:5px;height:5px;border-radius:50%;background:${d.color};box-shadow:0 0 4px ${d.color};flex-shrink:0"></span>
            <span style="color:#c8c8e0">${t.name}</span>
        </button>
        <div id="tool-${d.id}-${i}" class="tool-detail w-full mt-1 mb-2">
            <div class="rounded-10 p-3" style="background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07); border-radius:10px">
                <p class="text-xs mb-2" style="color:#8888a8">${t.description}</p>
                <div class="flex flex-wrap gap-1.5">
                    ${t.params.map(p => `
                        <span class="param-tag ${t.required.includes(p) ? 'required' : ''}">
                            ${t.required.includes(p) ? '* ' : ''}${p}
                        </span>`).join('')}
                </div>
            </div>
        </div>`).join('');

    const typeColors = {
        'Table':        { bg:'rgba(64,136,255,.1)',  fg:'#4088ff',  border:'rgba(64,136,255,.2)'  },
        'View':         { bg:'rgba(16,217,122,.1)',  fg:'#10d97a',  border:'rgba(16,217,122,.2)'  },
        'Vector Store': { bg:'rgba(255,79,163,.1)',  fg:'#ff4fa3',  border:'rgba(255,79,163,.2)'  },
        'Engine':       { bg:'rgba(224,64,251,.1)',  fg:'#e040fb',  border:'rgba(224,64,251,.2)'  },
        'Automation':   { bg:'rgba(255,107,53,.1)',  fg:'#ff6b35',  border:'rgba(255,107,53,.2)'  },
    };

    const tablesHtml = d.tables.map((t, ti) => {
        const tc = typeColors[t.type] || typeColors['Table'];
        const isDb = t.type === 'Table' && schema[t.name];
        const uid = `schema-${d.id}-${ti}`;
        const colsHtml = isDb ? schema[t.name].map(col => {
            const ct = typeColor(col.type);
            return `<div class="schema-col-row">
                <span class="schema-col-name ${col.pk ? 'pk' : ''}">${col.pk ? '🔑 ' : ''}${col.name}</span>
                <span class="col-type-badge" style="background:${ct.bg};color:${ct.fg};border:1px solid ${ct.border}">${col.type||'TEXT'}</span>
            </div>`;
        }).join('') : '';

        return `
            <div class="table-row ${isDb ? 'clickable' : ''}" ${isDb ? `onclick="toggleSchema('${uid}')"` : ''}>
                <span class="type-badge" style="background:${tc.bg}; color:${tc.fg}; border:1px solid ${tc.border}">${t.type}</span>
                <div style="flex:1; min-width:0">
                    <p class="text-xs font-semibold mb-0.5" style="color:#d0d0e8; font-family: monospace">${t.name}</p>
                    <p class="text-xs" style="color:#44445a">${t.description}</p>
                </div>
                ${isDb ? `<span class="chevron" id="chev-${uid}">▶</span>` : ''}
            </div>
            ${isDb ? `<div class="schema-panel" id="${uid}">
                <div class="schema-inner">${colsHtml}</div>
            </div>` : ''}`;
    }).join('');

    return `
    <div class="domain-card" style="box-shadow: 0 0 0 0 ${d.color}">
        <div style="height:3px; background:linear-gradient(90deg, ${d.color}, ${d.color}44)"></div>
        <div class="px-5 pt-4 pb-3" style="border-bottom:1px solid rgba(255,255,255,.05)">
            <div class="flex items-start justify-between gap-3">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl flex-shrink-0"
                         style="background:${d.color}18; border:1px solid ${d.color}30">${d.icon}</div>
                    <div>
                        <div class="flex items-center gap-2 mb-0.5">
                            <h2 class="text-sm font-bold" style="color:#f2f2f4">${d.name}</h2>
                            <span class="embedded-badge" style="background:rgba(16,217,122,.1); color:#10d97a; border:1px solid rgba(16,217,122,.2)">
                                <span style="width:5px;height:5px;border-radius:50%;background:#10d97a;box-shadow:0 0 4px #10d97a"></span>EMBEDDED
                            </span>
                        </div>
                        <p class="text-xs" style="color:#3a3a58">${d.tools.length} tools · ${d.tables.length} data sources</p>
                    </div>
                </div>
            </div>
            <p class="text-xs mt-3 leading-relaxed" style="color:#6666a0">${d.description}</p>
        </div>
        <div class="px-5 pt-3.5 pb-3" style="border-bottom:1px solid rgba(255,255,255,.04)">
            <p class="slabel mb-2.5">Tools (${d.tools.length})</p>
            <div class="flex flex-wrap gap-2">${toolsHtml}</div>
        </div>
        <div>
            <p class="slabel px-5 pt-3.5 mb-0">Data Sources (${d.tables.length})</p>
            ${tablesHtml}
        </div>
    </div>`;
}

function renderSchemaSection(schema) {
    const tables = Object.entries(schema).sort((a,b) => a[0].localeCompare(b[0]));
    document.getElementById('schema-grid').innerHTML = tables.map(([name, cols]) => {
        const colsHtml = cols.map(col => {
            const ct = typeColor(col.type);
            return `<div class="schema-field">
                <span class="field-name ${col.pk ? 'pk' : ''}">${col.pk ? '🔑 ' : ''}${col.name}</span>
                <span class="col-type-badge" style="background:${ct.bg};color:${ct.fg};border:1px solid ${ct.border}">${col.type||'TEXT'}</span>
            </div>`;
        }).join('');
        return `
        <div class="schema-table-card">
            <div class="schema-table-header" onclick="toggleSchemaCard('stbl-${name}', this)">
                <span style="font-size:.7rem; color:#333360">⊞</span>
                <span class="schema-table-name">${name}</span>
                <span class="schema-col-count">${cols.length} cols</span>
                <span class="chevron" style="font-size:.65rem">▶</span>
            </div>
            <div class="schema-cols-body" id="stbl-${name}">${colsHtml}</div>
        </div>`;
    }).join('');
}

function toggleSchema(uid) {
    const panel = document.getElementById(uid);
    const chev  = document.getElementById('chev-' + uid);
    const open  = panel.classList.toggle('open');
    if (chev) chev.classList.toggle('open', open);
}

function toggleSchemaCard(id, header) {
    const body = document.getElementById(id);
    const chev = header.querySelector('.chevron');
    const open = body.classList.toggle('open');
    if (chev) chev.classList.toggle('open', open);
}

function toggleTool(domainId, idx) {
    const detail = document.getElementById(`tool-${domainId}-${idx}`);
    const pill   = document.getElementById(`pill-${domainId}-${idx}`);
    const isOpen = detail.classList.toggle('open');
    pill.classList.toggle('active', isOpen);
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        document.querySelectorAll('.schema-panel.open').forEach(p => {
            p.classList.remove('open');
            const chev = document.getElementById('chev-' + p.id);
            if (chev) chev.classList.remove('open');
        });
        document.querySelectorAll('.schema-cols-body.open').forEach(p => p.classList.remove('open'));
        document.querySelectorAll('.tool-detail.open').forEach(p => p.classList.remove('open'));
        document.querySelectorAll('.tool-pill.active').forEach(p => p.classList.remove('active'));
    }
});

load();
</script>
</body>
</html>
